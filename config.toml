# Hyra Scribe Ledger Configuration

[node]
id = "node-1"
data_dir = "./data"

[storage]
s3_bucket = "scribe-ledger-dev"
s3_region = "us-east-1"
buffer_size = 67108864  # 64MB
segment_size_limit = 1073741824  # 1GB

[consensus]
peers = []
election_timeout_ms = 5000
heartbeat_interval_ms = 1000

[network]
listen_addr = "0.0.0.0"
client_port = 8080
consensus_port = 8081