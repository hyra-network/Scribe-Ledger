[package]
name = "scribe-ledger"
version = "0.1.0"
edition = "2021"
authors = ["Hyra Network <dev@hyra.network>"]
description = "Verifiable, Durable Off-Chain Storage for the Hyra AI Ecosystem"
license = "MIT"
repository = "https://github.com/hyra-network/Scribe-Ledger"
readme = "README.md"
keywords = ["blockchain", "storage", "ai", "distributed", "ledger"]
categories = ["database", "cryptography", "network-programming"]

[dependencies]
# Async runtime and utilities
tokio = { version = "1.0", features = ["full"] }
tokio-util = "0.7"

# Embedded database for local storage
sled = "0.34"

# Consensus algorithm
raft = "0.7"
prost = "0.12"

# AWS S3 integration
aws-sdk-s3 = "1.0"
aws-config = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# Cryptography
sha2 = "0.10"
merkle = "1.0"

# Networking
hyper = { version = "1.0", features = ["full"] }
hyper-util = { version = "0.1", features = ["full"] }
tonic = "0.11"
tower = "0.4"

# Error handling and logging
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Utilities
uuid = { version = "1.0", features = ["v4", "serde"] }
bytes = "1.0"
futures = "0.3"
clap = { version = "4.0", features = ["derive"] }
toml = "0.9.7"
hex = "0.4.3"
slog = "2.7.0"
slog-term = "2.9.2"
slog-async = "2.8.0"

[dev-dependencies]
tempfile = "3.0"
criterion = "0.5"

[[bin]]
name = "scribe-node"
path = "src/bin/node.rs"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
