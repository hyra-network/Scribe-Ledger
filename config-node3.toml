# Node 3 Configuration - Follower
[node]
id = "node-3"
data_dir = "./data/node3"

[storage]
buffer_size = 67108864  # 64MB
segment_size_limit = 1073741824  # 1GB

[storage.s3]
bucket = "scribe-ledger-cluster"
region = "us-east-1"
endpoint = "http://localhost:9000"  # MinIO
access_key = "minioadmin"
secret_key = "minioadmin"
path_style = true  # Use path-style for MinIO

[consensus]
peers = ["127.0.0.1:8081", "127.0.0.1:8082", "127.0.0.1:8083"]
election_timeout_ms = 5000
heartbeat_interval_ms = 1000

[network]
listen_addr = "127.0.0.1"
client_port = 8100
raft_tcp_port = 8083

[logging]
level = "info"
output = "stdout"